server {
    listen 80;
    server_name booktracker-demo.anthonyem.com;

    # Static Files
    location /library_demo_static/ {
        alias /usr/share/nginx/html/static/;
        expires 7d;
    }

    # Media Files
    location /media/ {
        alias /usr/share/nginx/html/media/;  # Make sure this path is correct
        expires 7d;
    }

    # Django Application
    location / {
        proxy_pass http://library_demo_web:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
