version: '3.8'

services:
  library_demo_web:
    build: .
    command: gunicorn library_demo_project.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/code
      - library_static_volume:/code/staticfiles
      - library_media_volume:/code/media
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
    networks:
      - hubstation

  library_demo_nginx:
    image: nginx:1.21-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - library_static_volume:/usr/share/nginx/html/static
      - library_media_volume:/usr/share/nginx/html/media
    depends_on:
      - library_demo_web
    networks:
      - hubstation

networks:
  hubstation:
    external: true

volumes:
  library_static_volume:
  library_media_volume: