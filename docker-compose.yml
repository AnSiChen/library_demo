version: '3.8'

services:
  library_demo_web:
    build:
      context: .
      args:
        DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    command: gunicorn library_demo_project.wsgi:application --bind 0.0.0.0:8010
    volumes:
      - .:/code
      - library_static_volume:/code/staticfiles
      - library_media_volume:/code/media
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}

    ports:
      - "8010:8010"
    networks:
      - hubstation_frontend_network

  library_demo_nginx:
    image: nginx:1.21-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - library_static_volume:/usr/share/nginx/html/static

    ports:
      - "8011:80"
    depends_on:
      - library_demo_web
    networks:
      - hubstation_frontend_network


networks:
  hubstation_frontend_network:
    external: true

volumes:
  library_static_volume:  
  library_media_volume:
