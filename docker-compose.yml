version: '3.8'

services:
  web:
    build:
      context: .
      args:
        - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
    command: gunicorn library_demo_project.wsgi:application --bind 0.0.0.0:8010
    volumes:
      - .:/code
      - static_volume:/code/static
      - media_volume:/code/media
    environment:
      - DJANGO_SECRET_KEY=django-insecure-0quw1zfx!urg$$luzju8x&+=_rl&w6zb-iadle5qyo$

    ports:
      - "8010:8010"
    networks:
      - hubstation_frontend_network

  nginx:
    image: nginx:1.21-alpine
    volumes:
      - static_volume:/usr/share/nginx/html/static
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8011:80" 
    depends_on:
      - web
    networks:
      - hubstation_frontend_network

networks:
  hubstation_frontend_network:
    external: true

volumes:
  static_volume:
  media_volume:
