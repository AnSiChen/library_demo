{% extends 'base.html' %}
{% block content %}
<div class="password-reset-form-container">
    <h2>Reset Your Password</h2>
    <!-- <p>Enter your email address, and we'll send you a link to reset your password.</p> -->
        <p>Since this is a demo version, the password reset link will not be sent to your email. Instead, you can use the demo credentials to log in, available at Loging page. Thank you!</p>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
    </form>
</div>
{% endblock %}
