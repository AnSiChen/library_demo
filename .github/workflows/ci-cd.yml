name: CI/CD Pipeline for Django Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v3

    - name: Deploy to the server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          set -e  # Stop on error

          mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts

          if [ ! -d "~/library_demo/.git" ]; then
            git clone git@github.com:AnSiChen/library_demo.git ~/library_demo
          fi

          cd ~/library_demo
          if git pull origin main; then
            echo "Repository updated successfully."
          else
            echo "Failed to update repository."
            exit 1
          fi
          
          if docker-compose down; then
            echo "Docker containers stopped."
          else
            echo "Failed to stop Docker containers."
            exit 1
          fi
          
          docker volume rm library_demo_static_volume || echo "Volume not found. Continuing..."
          
          if docker-compose up -d --build; then
            echo "Deployment successful."
          else
            echo "Deployment failed."
            exit 1
          fi
