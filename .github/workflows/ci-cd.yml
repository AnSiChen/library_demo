name: CI/CD Pipeline for Django Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            export DJANGO_SECRET_KEY="${{ secrets.DJANGO_SECRET_KEY }}"

            cd ~/booktracker

            git pull origin main

            docker compose up --build -d

            docker compose exec -T library_demo_web python manage.py migrate
            docker compose exec -T library_demo_web python manage.py collectstatic --noinput