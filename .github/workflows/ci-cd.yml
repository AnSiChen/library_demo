name: CI/CD Pipeline for Django Application

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v3

    - name: Set Environment Variables
      run: |
        echo "DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}" >> $GITHUB_ENV
    
    - name: Deploy to the server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
            set -e  # Stop on error
            export DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            cd ~/library_demo
            git pull origin main
            docker-compose down
            docker volume rm library_demo_static_volume || echo "Volume not found. Continuing..."
            docker-compose build --no-cache  # Building images without using cache
            docker-compose up -d  # Starting up services
            export DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY
            # Additional commands to handle migrations and collect static if needed
            docker-compose exec web python manage.py migrate
            docker-compose exec web python manage.py collectstatic --noinput
